name: Build SPA

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-spa:
    runs-on: ubuntu-latest
    # Skip if commit was made by this workflow (contains [skip ci])
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build SPA
        run: |
          rm -rf public/spa
          pnpm run build:spa:raw
          pnpm run build:spa:copy
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NODE_ENV: production

      - name: Commit SPA build artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/spa/
          git add -f "src/app/spa/[variants]/[[...path]]/spaHtmlTemplates.ts"
          if git diff --staged --quiet; then
            echo "No SPA changes to commit"
          else
            git commit -m "chore: build SPA artifacts [skip ci]"
            git push origin main
          fi
